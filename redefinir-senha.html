<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#086647">
  <title>Defina uma nova senha | Dinheiro Meu é Dinheiro Nosso!</title>
  <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/tokens.css"><link rel="stylesheet" href="/css/global.css"><link rel="stylesheet" href="/css/auth.css">
  <script src="/js/env.js"></script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel">
      <a class="auth-brand" href="/"><img src="/assets/logo.svg" alt="Dinheiro Meu é Dinheiro Nosso!"></a>
      <div class="auth-box">
        <h1>Defina uma nova senha</h1><p>Escolha uma senha forte e diferente das que você utiliza em outros serviços.</p>
        <div data-auth-message class="alert alert-info" hidden></div>
        <form class="auth-form" data-auth-form="reset" novalidate><div class="field"><label for="password">Nova senha</label><input class="input" id="password" name="password" type="password" minlength="8" autocomplete="new-password" required></div>
       <div class="field"><label for="password_confirmation">Confirme a nova senha</label><input class="input" id="password_confirmation" name="password_confirmation" type="password" minlength="8" autocomplete="new-password" required></div><button class="btn btn-primary btn-block" type="submit">Alterar senha</button></form>
        <div class="auth-links"><a href="/entrar">Voltar para o login</a></div>
      </div>
    </section>
    <aside class="auth-visual"><div class="auth-message"><h2>Segurança sem complicação.</h2><p>A nova senha é processada pelo Supabase Auth. O sistema não armazena senhas em tabelas próprias.</p><div class="auth-stat"><span>Horizonte financeiro</span><strong>12 meses</strong></div></div></aside>
  </main>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
